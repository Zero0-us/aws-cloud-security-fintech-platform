# ============================================================
# bank-web — 뱅킹 웹 프론트엔드 (Next.js)
# ============================================================
# 기능: 계좌조회, 송금, 거래내역, 금융상품, 설정
# 원본: JOA bank/frontend (React Native) → Next.js 변환
# 포트: 3000

apiVersion: apps/v1
kind: Deployment
metadata:
  name: bank-web
  labels:
    app: bank-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bank-web
  template:
    metadata:
      labels:
        app: bank-web
    spec:
      containers:
        - name: bank-web
          image: 423401347162.dkr.ecr.ap-northeast-2.amazonaws.com/bank-web:latest
          ports:
            - containerPort: 3000
          env:
            # 오픈뱅킹 API (계좌/거래/송금/상품)
            - name: NEXT_PUBLIC_API_URL
              value: "http://openapi-backend:8080"
            # 뱅킹 백엔드 (회원/로그인)
            - name: NEXT_PUBLIC_MEMBER_API_URL
              value: "http://bank-backend:8080"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: bank-web
spec:
  type: ClusterIP
  selector:
    app: bank-web
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000

