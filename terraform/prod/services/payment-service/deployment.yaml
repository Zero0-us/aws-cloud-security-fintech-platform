apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment
  template:
    metadata:
      labels:
        app: payment
    spec:
      containers:
      - name: payment-service
        image: 549027855245.dkr.ecr.ap-northeast-2.amazonaws.com/fin-prod-payment:latest
        ports:
        - containerPort: 5000
        resources:
          limits:
            memory: "128Mi"
          requests:
            memory: "64Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
spec:
  type: LoadBalancer
  selector:
    app: payment
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000