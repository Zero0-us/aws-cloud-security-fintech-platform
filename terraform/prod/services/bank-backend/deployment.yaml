# ============================================================
# bank-backend — 뱅킹 백엔드 (Spring Boot)
# ============================================================
# 기능: 회원 가입/로그인/로그아웃, 이메일 인증
# 포트: 8080 (Spring Boot 기본)
# 이미지: ECR bank-backend 리포지토리

apiVersion: apps/v1
kind: Deployment
metadata:
  name: bank-backend
  labels:
    app: bank-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bank-backend
  template:
    metadata:
      labels:
        app: bank-backend
    spec:
      containers:
        - name: bank-backend
          # ⚠️ AWS_ACCOUNT_ID를 실제 Prod 계정 ID로 교체
          image: 423401347162.dkr.ecr.ap-northeast-2.amazonaws.com/bank-backend:latest
          ports:
            - containerPort: 8080
          env:
            # Spring Profile
            - name: SPRING_PROFILES_ACTIVE
              value: "deploy"
            # DB 설정
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://$(DB_HOST):$(DB_PORT)/$(DB_NAME)?serverTimezone=Asia/Seoul"
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: fintech-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: fintech-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: fintech-config
                  key: DB_NAME
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: fintech-secrets
                  key: db-username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fintech-secrets
                  key: db-password
            # Redis
            - name: SPRING_DATA_REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: fintech-config
                  key: REDIS_HOST
            - name: SPRING_DATA_REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: fintech-config
                  key: REDIS_PORT
            - name: SPRING_DATA_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fintech-secrets
                  key: redis-password
            # JWT
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: fintech-secrets
                  key: jwt-secret
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: bank-backend
spec:
  type: ClusterIP
  selector:
    app: bank-backend
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080

