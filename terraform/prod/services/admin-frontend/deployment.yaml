# ============================================================
# admin-frontend — 관리자 대시보드 (Next.js)
# ============================================================
# 기능: 관리자 대시보드 UI (차트, 회원관리 등)
# 포트: 3000 (Next.js 기본)

apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-frontend
  labels:
    app: admin-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-frontend
  template:
    metadata:
      labels:
        app: admin-frontend
    spec:
      containers:
        - name: admin-frontend
          image: 423401347162.dkr.ecr.ap-northeast-2.amazonaws.com/admin-frontend:latest
          ports:
            - containerPort: 3000
          env:
            # admin-backend API 주소 (K8s 내부 Service DNS)
            - name: NEXT_PUBLIC_API_URL
              value: "http://admin-backend:8080"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: admin-frontend
spec:
  type: ClusterIP
  selector:
    app: admin-frontend
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000

