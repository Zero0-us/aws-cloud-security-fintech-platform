# ============================================================
# openapi-backend — 오픈뱅킹 API (Spring Boot)
# ============================================================
# 기능: 계좌 CRUD, 거래내역, 송금, 금융상품, 은행 관리
# 포트: 8080

apiVersion: apps/v1
kind: Deployment
metadata:
  name: openapi-backend
  labels:
    app: openapi-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openapi-backend
  template:
    metadata:
      labels:
        app: openapi-backend
    spec:
      containers:
        - name: openapi-backend
          image: 423401347162.dkr.ecr.ap-northeast-2.amazonaws.com/openapi-backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "deploy"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://$(DB_HOST):$(DB_PORT)/$(DB_NAME)?serverTimezone=Asia/Seoul"
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: fintech-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: fintech-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: fintech-config
                  key: DB_NAME
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: fintech-secrets
                  key: db-username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fintech-secrets
                  key: db-password
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: openapi-backend
spec:
  type: ClusterIP
  selector:
    app: openapi-backend
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080

