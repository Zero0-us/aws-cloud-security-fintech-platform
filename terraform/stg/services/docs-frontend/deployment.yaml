# ============================================================
# docs-frontend — API 문서 사이트 (Next.js)
# ============================================================
# 기능: JOA 오픈뱅킹 API 문서 (Swagger 스타일)
# 포트: 3000

apiVersion: apps/v1
kind: Deployment
metadata:
  name: docs-frontend
  labels:
    app: docs-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docs-frontend
  template:
    metadata:
      labels:
        app: docs-frontend
    spec:
      containers:
        - name: docs-frontend
          image: 423401347162.dkr.ecr.ap-northeast-2.amazonaws.com/docs-frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "http://openapi-backend:8080"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: docs-frontend
spec:
  type: ClusterIP
  selector:
    app: docs-frontend
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000

