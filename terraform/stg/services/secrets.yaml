# ============================================================
# secrets.yaml — 민감 정보 (비밀번호, 키)
# ============================================================
# ⚠️ 이 파일은 예시입니다. 실제 배포 시:
#   1. 값을 실제 비밀번호로 교체
#   2. base64 인코딩: echo -n '실제값' | base64
#   3. 이 파일을 Git에 커밋하지 마세요!
#
# 더 안전한 방법: AWS Secrets Manager + External Secrets Operator

apiVersion: v1
kind: Secret
metadata:
  name: fintech-secrets
type: Opaque
data:
  # ┌──────────────────────────────────────────────────────┐
  # │ base64 인코딩 방법:                                  │
  # │ PowerShell: [Convert]::ToBase64String(               │
  # │   [Text.Encoding]::UTF8.GetBytes("실제값"))          │
  # │ Linux/Mac: echo -n '실제값' | base64                 │
  # └──────────────────────────────────────────────────────┘

  # RDS admin 비밀번호 (Terraform Secrets Manager에서 생성된 값)
  db-username: YWRtaW4=
  db-password: Q0hBTkdFX01FfREJfUEFTU1dPUkQ=

  # Redis 비밀번호
  redis-password: Q0hBTkdFX01FfUkVESVNfUEFTU1dPUkQ=

  # JWT 서명 키 (bank-backend, admin-backend에서 사용)
  jwt-secret: Q0hBTkdFX01FfSldUX1NFQ1JFVA==

  # 이메일 인증용 비밀번호 (bank-backend SMTP)
  mail-password: Q0hBTkdFX01FfTUFJTF9QQVNTV09SRA==
